
<style>
#erd-wrap {
  --brand: #21C0B1;
  --brand-light: rgba(33,192,177,.12);
  --brand-mid: rgba(33,192,177,.28);
  --brand-strong: rgba(33,192,177,.72);
  --brand-text: #0a6b63;
  --brand-text-dark: #7ef0e8;
  padding: 1.25rem 0;
}
@media (prefers-color-scheme: dark) {
  #erd-wrap {
    --brand-text: #7ef0e8;
  }
}

/* entity outer box */
#erd-wrap svg .node rect,
#erd-wrap svg .node path {
  fill: var(--brand-light) !important;
  stroke: var(--brand-strong) !important;
  stroke-width: 1.2px !important;
}

/* header row */
#erd-wrap svg .label-container rect,
#erd-wrap svg .nodeLabel {
  fill: rgba(33,192,177,.32) !important;
}

/* connector lines */
#erd-wrap svg path.er.relationshipLine,
#erd-wrap svg line.er.relationshipLine {
  stroke: var(--brand) !important;
  stroke-width: 1.4px !important;
}

/* cardinality & label text */
#erd-wrap svg .er.relationshipLabelBox rect {
  fill: var(--brand-light) !important;
  stroke: var(--brand-mid) !important;
}
#erd-wrap svg text {
  fill: var(--brand-text) !important;
}
@media (prefers-color-scheme: dark) {
  #erd-wrap svg text {
    fill: var(--brand-text-dark) !important;
  }
  #erd-wrap svg .node rect,
  #erd-wrap svg .node path {
    fill: rgba(33,192,177,.10) !important;
    stroke: rgba(33,192,177,.55) !important;
  }
  #erd-wrap svg .label-container rect {
    fill: rgba(33,192,177,.22) !important;
  }
  #erd-wrap svg .er.relationshipLabelBox rect {
    fill: rgba(33,192,177,.12) !important;
    stroke: rgba(33,192,177,.3) !important;
  }
}
</style>

<div id="erd-wrap">
  <div id="erd"></div>
</div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: 'rgba(33,192,177,.18)',
    primaryBorderColor: 'rgba(33,192,177,.7)',
    primaryTextColor: dark ? '#7ef0e8' : '#0a6b63',
    lineColor: dark ? 'rgba(33,192,177,.7)' : '#21C0B1',
    edgeLabelBackground: 'rgba(33,192,177,.12)',
    attributeBackgroundColorEven: 'rgba(33,192,177,.06)',
    attributeBackgroundColorOdd: 'rgba(33,192,177,.13)',
    nodeBorder: 'rgba(33,192,177,.7)',
    clusterBkg: 'rgba(33,192,177,.08)',
    titleColor: dark ? '#7ef0e8' : '#0a6b63',
    tertiaryColor: 'rgba(33,192,177,.08)',
  },
});

const diagram = `erDiagram
  Traders {
    int trader_id PK
    varchar name
    varchar email
    enum role
    enum status
  }
  Accounts {
    int account_id PK
    varchar account_name
    enum account_type
    char base_currency
    int trader_id FK
    enum status
  }
  Assets {
    int asset_id PK
    varchar ticker
    varchar name
    enum asset_class
    varchar market
    char currency
    decimal last_price
    enum status
  }
  Counterparties {
    int counterparty_id PK
    varchar name
    enum type
    varchar country
    varchar credit_rating
    enum status
  }
  Transactions {
    int transaction_id PK
    int account_id FK
    int asset_id FK
    int counterparty_id FK
    enum trade_type
    enum direction
    decimal quantity
    decimal execution_price
    enum status
    datetime traded_at
  }
  Holdings {
    int holding_id PK
    int account_id FK
    int asset_id FK
    decimal net_quantity
    decimal avg_cost_price
  }
  Risk_Limits {
    int limit_id PK
    int account_id FK
    int asset_id FK
    enum asset_class
    decimal max_position
    decimal max_concentration
    decimal alert_threshold
    boolean is_active
  }

  Traders ||--o{ Accounts : "manages"
  Accounts ||--o{ Transactions : "executes"
  Accounts ||--o{ Holdings : "holds"
  Accounts ||--o{ Risk_Limits : "governed by"
  Assets ||--o{ Transactions : "traded in"
  Assets ||--o{ Holdings : "held as"
  Assets ||--o{ Risk_Limits : "limited by"
  Counterparties ||--o{ Transactions : "party to"
`;

const { svg } = await mermaid.render('erd-svg2', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
