services:
  mysql:
    image: mysql:8.0
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: portfolio_mgmt
      MYSQL_USER: trader
      MYSQL_PASSWORD: traderpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-utrader", "-ptraderpass123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portfolio_api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: trader
      DB_PASSWORD: traderpass123
      DB_NAME: portfolio_mgmt
    ports:
      - "80:8000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
